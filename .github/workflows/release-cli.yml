name: Release CLI

on:
  push:
    branches:
      - main
    paths:
      - 'apps/cli/package.json'
      - 'apps/cli/CHANGELOG.md'
      - '.github/workflows/release-cli.yml'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-cli-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect CLI release
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: node tooling/release/package-version-diff.mjs --surface cli --base "${{ github.event.before }}" --head "${{ github.sha }}" --github-output

  publish:
    name: Publish CLI and create release
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CLI CI
        run: pnpm run ci:cli

      - name: Publish CLI package
        working-directory: apps/cli
        run: npm publish

      - name: Build release notes
        run: node tooling/release/changelog-entry.mjs --surface cli --version "${{ needs.detect.outputs.version }}" --output release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: ${{ needs.detect.outputs.release_name }}
          body_path: release-notes.md
          target_commitish: ${{ github.sha }}
