name: API Contracts

on:
  pull_request:
    paths:
      - '.github/workflows/api-contracts.yml'
      - 'apps/api/**'
      - 'packages/api-client/**'
      - 'packages/contracts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/api-contracts.yml'
      - 'apps/api/**'
      - 'packages/api-client/**'
      - 'packages/contracts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'

jobs:
  verify:
    name: Verify OpenAPI Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Type-check contracts
        run: pnpm --filter @howicc/contracts type-check

      - name: Test API worker
        run: pnpm --filter @howicc/api test

      - name: Type-check API worker
        run: pnpm --filter @howicc/api type-check

      - name: Verify generated API client is up to date
        run: pnpm --filter @howicc/api-client run generate:check

      - name: Test generated API client
        run: pnpm --filter @howicc/api-client test

      - name: Type-check generated API client
        run: pnpm --filter @howicc/api-client type-check
