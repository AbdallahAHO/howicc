name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed release surfaces
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.diff.outputs.api }}
      web: ${{ steps.diff.outputs.web }}
      cli: ${{ steps.diff.outputs.cli }}
      jobs: ${{ steps.diff.outputs.jobs }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed surfaces
        id: diff
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          node tooling/release/changed-surfaces.mjs --base "$BASE_SHA" --head "$HEAD_SHA" --github-output

  api:
    name: Validate API
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API CI
        run: pnpm run ci:api

  web:
    name: Validate Web
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web CI
        run: pnpm run ci:web

  cli:
    name: Validate CLI
    needs: detect
    if: needs.detect.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CLI CI
        run: pnpm run ci:cli

  jobs:
    name: Validate Jobs
    needs: detect
    if: needs.detect.outputs.jobs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run jobs CI
        run: pnpm run ci:jobs

  validate:
    name: Validate
    if: always()
    needs:
      - detect
      - api
      - web
      - cli
      - jobs
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required CI jobs passed
        env:
          DETECT_RESULT: ${{ needs.detect.result }}
          API_RESULT: ${{ needs.api.result }}
          WEB_RESULT: ${{ needs.web.result }}
          CLI_RESULT: ${{ needs.cli.result }}
          JOBS_RESULT: ${{ needs.jobs.result }}
        run: |
          for result in "$DETECT_RESULT" "$API_RESULT" "$WEB_RESULT" "$CLI_RESULT" "$JOBS_RESULT"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "CI dependency failed with result: $result"
              exit 1
            fi
          done
