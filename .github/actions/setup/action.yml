name: Setup workspace
description: Check out the repo, install pnpm + Node.js, and install dependencies.

inputs:
  fetch-depth:
    description: Depth passed to actions/checkout.
    required: false
    default: '1'
  registry-url:
    description: Optional npm registry URL for setup-node.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
