name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        id: review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          warn-only: true

      - name: Enforce dependency policy
        if: always()
        env:
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
          VULNERABLE_CHANGES: ${{ steps.review.outputs.vulnerable-changes }}
          INVALID_LICENSE_CHANGES: ${{ steps.review.outputs.invalid-license-changes }}
          DENIED_CHANGES: ${{ steps.review.outputs.denied-changes }}
        run: |
          has_entries() {
            local value="$1"

            if [[ -z "$value" || "$value" == "null" ]]; then
              return 1
            fi

            echo "$value" | jq -e '
              if type == "array" then length > 0
              elif type == "object" then length > 0
              else . != null and . != ""
              end
            ' >/dev/null
          }

          if [[ "$REVIEW_OUTCOME" == "failure" ]]; then
            echo "GitHub dependency review is not available for this repository yet; skipping this check."
            exit 0
          fi

          if has_entries "$VULNERABLE_CHANGES"; then
            echo "Dependency review reported vulnerable dependency changes."
            echo "$VULNERABLE_CHANGES" | jq
            exit 1
          fi

          if has_entries "$INVALID_LICENSE_CHANGES"; then
            echo "Dependency review reported license policy violations."
            echo "$INVALID_LICENSE_CHANGES" | jq
            exit 1
          fi

          if has_entries "$DENIED_CHANGES"; then
            echo "Dependency review reported denied dependency changes."
            echo "$DENIED_CHANGES" | jq
            exit 1
          fi
