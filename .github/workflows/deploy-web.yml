name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/package.json'
      - 'apps/web/CHANGELOG.md'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect web release
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: node tooling/release/package-version-diff.mjs --surface web --base "${{ github.event.before }}" --head "${{ github.sha }}" --github-output

  deploy:
    name: Deploy web to Cloudflare
    needs: detect
    if: needs.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production-web
      url: https://howi.cc
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web CI
        run: pnpm run ci:web

      - name: Deploy web worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.81.0
          workingDirectory: apps/web
          packageManager: pnpm
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --config dist/server/wrangler.json

      - name: Build release notes
        if: needs.detect.outputs.changed == 'true'
        run: node tooling/release/changelog-entry.mjs --surface web --version "${{ needs.detect.outputs.version }}" --output release-notes.md

      - name: Create GitHub release
        if: needs.detect.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: ${{ needs.detect.outputs.release_name }}
          body_path: release-notes.md
          target_commitish: ${{ github.sha }}
