name: Sync API Secrets

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'
      - '.github/workflows/sync-api-secrets.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-api-secrets-production
  cancel-in-progress: false

jobs:
  sync:
    name: Sync API Worker secrets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-api
    env:
      OPTIONAL_GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      OPTIONAL_GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync required API Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          SHARE_TOKEN_SECRET: ${{ secrets.SHARE_TOKEN_SECRET }}
        run: |
          printf '%s' "$BETTER_AUTH_SECRET" | pnpm --filter @howicc/api exec wrangler secret put BETTER_AUTH_SECRET --config wrangler.jsonc
          printf '%s' "$SHARE_TOKEN_SECRET" | pnpm --filter @howicc/api exec wrangler secret put SHARE_TOKEN_SECRET --config wrangler.jsonc

      - name: Sync optional GitHub OAuth secrets
        if: ${{ env.OPTIONAL_GH_OAUTH_CLIENT_ID != '' && env.OPTIONAL_GH_OAUTH_CLIENT_SECRET != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_CLIENT_ID: ${{ env.OPTIONAL_GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ env.OPTIONAL_GH_OAUTH_CLIENT_SECRET }}
        run: |
          printf '%s' "$GITHUB_CLIENT_ID" | pnpm --filter @howicc/api exec wrangler secret put GITHUB_CLIENT_ID --config wrangler.jsonc
          printf '%s' "$GITHUB_CLIENT_SECRET" | pnpm --filter @howicc/api exec wrangler secret put GITHUB_CLIENT_SECRET --config wrangler.jsonc
