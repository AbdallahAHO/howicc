name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Build application
        working-directory: ./app
        run: pnpm build
        env:
          PB_URL: http://localhost:8090
          PB_ADMIN_EMAIL: test@example.com
          PB_ADMIN_PASSWORD: test-password
          SERVER_API_KEY: test-api-key
          OPENROUTER_API_KEY: test-openrouter-key
          OPENROUTER_MODEL: anthropic/claude-3.5-sonnet
          PUBLIC_SITE_URL: http://localhost:4321

      - name: Check for secrets in client bundle
        working-directory: ./app
        run: pnpm check-secrets

      - name: Validate configuration
        working-directory: ./app
        run: pnpm validate-config
        env:
          PB_URL: http://localhost:8090
          NODE_ENV: production

      - name: Run security tests
        working-directory: ./app
        run: pnpm test -- src/tests/security.test.ts

      - name: Audit dependencies
        working-directory: ./app
        run: pnpm audit --audit-level=moderate || true
