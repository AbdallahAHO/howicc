name: Deploy Jobs

on:
  push:
    branches:
      - main
    paths:
      - 'apps/jobs/package.json'
      - 'apps/jobs/CHANGELOG.md'
      - '.github/workflows/deploy-jobs.yml'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: deploy-jobs-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect jobs release
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: node tooling/release/package-version-diff.mjs --surface jobs --base "${{ github.event.before }}" --head "${{ github.sha }}" --github-output

  deploy:
    name: Deploy jobs worker
    needs: detect
    if: needs.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-jobs
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run jobs CI
        run: pnpm run ci:jobs

      - name: Deploy jobs worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/jobs
          packageManager: pnpm
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --config wrangler.jsonc

      - name: Build release notes
        if: needs.detect.outputs.changed == 'true'
        run: node tooling/release/changelog-entry.mjs --surface jobs --version "${{ needs.detect.outputs.version }}" --output release-notes.md

      - name: Create GitHub release
        if: needs.detect.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: ${{ needs.detect.outputs.release_name }}
          body_path: release-notes.md
          target_commitish: ${{ github.sha }}
