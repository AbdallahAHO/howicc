name: Setup workspace
description: Install pnpm + Node.js and install dependencies. Assumes the repo is already checked out.

inputs:
  registry-url:
    description: Optional npm registry URL for setup-node.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
