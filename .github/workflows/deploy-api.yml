name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/package.json'
      - 'apps/api/CHANGELOG.md'
      - 'packages/db/migrations/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

concurrency:
  group: deploy-api-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect API release
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      migrations: ${{ steps.migrations.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: node tooling/release/package-version-diff.mjs --surface api --base "${{ github.event.before }}" --head "${{ github.sha }}" --github-output

      - name: Detect migration changes
        id: migrations
        run: |
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^packages/db/migrations/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  migrate:
    name: Apply production D1 migrations
    needs: detect
    if: needs.detect.outputs.changed == 'true' || needs.detect.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-db
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Apply production migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @howicc/api db:migrate:prod

  deploy:
    name: Deploy API to Cloudflare
    needs:
      - detect
      - migrate
    if: needs.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production-api
      url: https://api.howi.cc
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run API CI
        run: pnpm run ci:api

      - name: Deploy API worker
        uses: cloudflare/wrangler-action@v3
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          SHARE_TOKEN_SECRET: ${{ secrets.SHARE_TOKEN_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          packageManager: pnpm
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --config wrangler.jsonc --domains api.howi.cc
          secrets: |
            BETTER_AUTH_SECRET
            SHARE_TOKEN_SECRET
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET

      - name: Build release notes
        if: needs.detect.outputs.changed == 'true'
        run: node tooling/release/changelog-entry.mjs --surface api --version "${{ needs.detect.outputs.version }}" --output release-notes.md

      - name: Create GitHub release
        if: needs.detect.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: ${{ needs.detect.outputs.release_name }}
          body_path: release-notes.md
          target_commitish: ${{ github.sha }}
